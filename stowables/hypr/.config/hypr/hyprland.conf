# ENVIRONMENT VARIABLES ---------------
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_STYLE_OVERRIDE,kvantum
env = XCURSOR_THEME,Bibata-Modern-Ice
# NEW: keep X and hyprcursor sizes in sync with `hyprctl setcursor ... 25`
env = XCURSOR_SIZE,25
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,25
# NEW: makes Electron apps (Discord, VSCodium, etc.) run natively on Wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# EXECUTE AT START COMMANDS --------
exec-once = hyprctl setcursor Bibata-Modern-Ice 25
exec-once = ~/.config/waybar/launch.sh
exec-once = awww-daemon
exec-once = copyq --start-server
exec-once = hyprpm reload -n
exec-once = wal -R -n
exec-once = ~/.local/bin/start-quickshell.sh
exec-once = swaync
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mpd-mpris
exec-once = kdeconnect-indicator
exec-once = syncthing # starts on http://127.0.0.1:8384/#
exec-once = miniserve "$HOME/dotfiles/utils/firefox/" --index home.html --header "Cache-Control: no-cache, no-store, must-revalidate"
exec-once = systemctl --user start hyprpolkitagent

plugin {
    gloview {
        layout = rows
        gap = 34
        padding = 80
        padding_top = 40
        padding_bottom = 70
        max_scale = 1.0
        duration = 200
        preview_round = 12
        blur = 1

        anchor = top
        strip_offset = 0
        strip_height = 150
        strip_margin = 22
        strip_gap = 18
        strip_card_round = 10

        focus_follows_mouse       = 1
        scroll_switches_workspace = 1
        passthrough_keys          = 1
        exit_on_click             = 1
        exit_on_switch            = 0

        key_close     = escape
        key_next_workspace = tab
        key_prev_workspace = shift+tab
        key_activate  = enter
        key_close_window = d
        key_left      = left
        key_right     = right
        key_up        = up
        key_down      = down
        key_desktop   = shift
        key_all_workspaces = a
        key_workspace = 1,2,3,4,5,6,7,8,9,0

        show_all_workspaces     = 0
        show_empty              = 1
        show_special            = 0
        strip_all_card          = 0
        drag_to_swap            = 1
        switch_on_drop          = 0
        switch_on_new_workspace = 1

        hide_top_layers     = 0
        hide_overlay_layers = 0
        above_namespaces    =
        debug_logs = 0

        select_border_size  = 3
        select_border       = 0xf066ccff
        close_button_color  = 0xe6e23b3b
        backdrop_color      = 0x73070a10
        strip_band_color    = 0x24ffffff
        strip_card_color    = 0x3a0e131c
        strip_active_color  = 0x4d1c2c44
        strip_active_border = 0xf0ffffff
        strip_hover_border  = 0x80ffffff
        strip_active_border_size = 2
        strip_hover_border_size  = 2
        strip_plus_color    = 0xd0eef4ff
        shadow_color        = 0x70000000
        hover_border        = 0xf0ffffff
        hover_border_size   = 3
    }
}

$mainMod = SUPER

cursor {
    inactive_timeout = 3
    hide_on_key_press = true
}

xwayland {
    force_zero_scaling = true
}

misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# NEW: 0.51+ gesture syntax — 3-finger swipe to change workspaces on the laptop
gestures {
    gesture = 3, horizontal, workspace
}

general {
    gaps_in = 3
    gaps_out = 8
    border_size = 1
    col.active_border = rgb(585b70)
    col.inactive_border = rgb(2a2b36)
    layout = scrolling
}

# Glowview 
bind = $mainMod, g, gloview:toggle
bind = $mainMod SHIFT, g, gloview:desktop
bind = $mainMod CTRL, g, gloview:allworkspaces

# --- Keybinds for the Scrolling Layout ---
bindd = $mainMod, f, Maximize App Window, fullscreen, 1
# Move focus between columns
bind = $mainMod, l, layoutmsg, focus r
bind = $mainMod, h, layoutmsg, focus l
bind = $mainMod, k, layoutmsg, focus u
bind = $mainMod, j, layoutmsg, focus d
# Move the entire layout left or right
bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col
# Move the active window into the adjacent column
bind = $mainMod CTRL, period, layoutmsg, movewindowto r
bind = $mainMod CTRL, comma, layoutmsg, movewindowto l
binde = $mainMod CTRL, h, layoutmsg, movewindowto l
binde = $mainMod CTRL, l, layoutmsg, movewindowto r
# Reverse: expel the active window out into its own column to the right
bind = $mainMod CTRL, p, layoutmsg, promote
# Resize columns
bind = $mainMod SHIFT, period, layoutmsg, colresize +conf
bind = $mainMod SHIFT, comma, layoutmsg, colresize -conf
bind = $mainMod SHIFT, l, layoutmsg, colresize +conf
bind = $mainMod SHIFT, h, layoutmsg, colresize -conf
binde = $mainMod SHIFT, k, resizeactive, 0 -40
binde = $mainMod SHIFT, j, resizeactive, 0 40

# Swapping
binde = $mainMod ALT, h, layoutmsg, swapcol l
binde = $mainMod ALT, l, layoutmsg, swapcol r
# Swapping
binde = $mainMod ALT, h, swapwindow, l
binde = $mainMod ALT, l, swapwindow, r
binde = $mainMod ALT, k, swapwindow, u
binde = $mainMod ALT, j, swapwindow, d

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.5
    explicit_column_widths = 0.25, 0.333, 0.5, 0.666, 0.75, 1.0
    focus_fit_method = 1
    follow_focus = true
}

decoration {
    rounding = 16
    active_opacity = 1.0
    inactive_opacity = 0.95
    dim_inactive = true
    dim_strength = 0.05
    shadow {
        enabled = true
        range = 35
        render_power = 4
        color = rgba(00000050)
        offset = 0 8
    }
    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.006
        brightness = 1.03
        contrast = 1.02
        vibrancy = 0.25
        vibrancy_darkness = 0.6
        new_optimizations = true
        xray = false
        popups = true
        special = true
    }
}

animations {
    enabled = true

    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0

    animation = windowsIn, 1, 4.5, bounce, slide
    animation = windowsOut, 1, 3.5, smooth, slide
    animation = windowsMove, 1, 4, buttery, slide

    animation = fadeIn, 1, 3.5, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 4, smooth
    animation = fadeShadow, 1, 4, smooth

    animation = workspaces, 1, 4.5, buttery, slidefade 10%
    animation = specialWorkspace, 1, 4.5, buttery, slidefadevert -15%

    animation = border, 1, 7, smooth
    animation = layersIn, 1, 4, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}

# WINDOW RULES ---------------
windowrule = suppress_event maximize, match:class .*

# DEFAULT PROGRAMS (TERMINAL, FILE MANAGER, MENU) ---------------
# $terminal = kitty -o allow_remote_control=yes --single-instance --listen-on unix:@mykitty
$terminal = ghostty
$fileManager = ghostty -e yazi
$menu = rofi -show drun -theme-str "dummywall{background-image:url('"~/wallpapers/current.jpg"', height);}"

# Toggle between the floating window and the terminal underneath
bind = ALT, Tab, cyclenext
bind = $mainMod, t, movecurrentworkspacetomonitor, r
bind = $mainMod SHIFT, t, movecurrentworkspacetomonitor, l

bind = $mainMod, q, exec, $terminal +new-window
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, N, exec, sh -c 'geom=$(slurp) && sleep 0.3 && grim -g "$geom" - | wl-copy'
# NEW: same region screenshot, but also saved to disk
bind = $mainMod SHIFT, N, exec, sh -c 'geom=$(slurp) && sleep 0.3 && grim -g "$geom" ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png'
bind = $mainMod SHIFT CTRL ALT, z, exec, wlogout
bind = $mainMod SHIFT CTRL ALT, l, exec, swaylock
bind = $mainMod, SPACE, exec, $menu

# refresh status bar for updates
bind = $mainMod, b, exec, ~/.local/bin/start-quickshell.sh && ~/.config/waybar/launch.sh

# Media/volume/brightness keys (work while locked via bindl/binde)
# NOTE: if you're on PipeWire, wpctl is the more direct tool:
#   wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde=, XF86AudioRaiseVolume, exec, amixer set Master 5%+
binde=, XF86AudioLowerVolume, exec, amixer set Master 5%-
bindl=, XF86AudioMute, exec, amixer set Master toggle
bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPrev, exec, playerctl previous
bindl=, XF86AudioPlay, exec, playerctl play-pause
binde=, XF86MonBrightnessUp, exec, brightnessctl s +5%
binde=, XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspaces (scratchpads)
bind = $mainMod, Backspace, togglespecialworkspace, magic
bind = $mainMod SHIFT, Backspace, movetoworkspace, special:magic

bind = $mainMod, Delete, togglespecialworkspace, magic-second
bind = $mainMod SHIFT, Delete, movetoworkspace, special:magic-second

bind = $mainMod, Tab, togglespecialworkspace, magic-third
bind = $mainMod SHIFT, Tab, movetoworkspace, special:magic-third

bind = $mainMod, grave, togglespecialworkspace, magic-fourth
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic-fourth

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Monitor Rules ---
monitor = eDP-1, preferred, 0x0, 1
monitor = DP-2, 5120x1440@119.97, auto, 1
monitor = , preferred, auto, 1

# --- Workspace Rules ---
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2

# wl-kbptr settings  -----
bind = $mainMod, r, exec, hyprctl dispatch submap reset && wl-kbptr -c /home/sybil/dotfiles/stowables/hypr/.config/hypr/config && hyprctl dispatch submap cursor

# --- Enter Fine-Tune Mode Directly (No Jump) ---
bind = $mainMod, a, exec, hyprctl keyword cursor:inactive_timeout 0; hyprctl keyword cursor:hide_on_key_press false; hyprctl dispatch submap cursor

# --- The Cursor Submap ---
submap = cursor
# Movement (held keys work due to 'binde')
binde = , j, exec, wlrctl pointer move 0 10
binde = , k, exec, wlrctl pointer move 0 -10
binde = , l, exec, wlrctl pointer move 10 0
binde = , h, exec, wlrctl pointer move -10 0
# Clicks
bind = , s, exec, wlrctl pointer click left
bind = , d, exec, wlrctl pointer click middle
bind = , f, exec, wlrctl pointer click right
# Scrolling
binde = , e, exec, wlrctl pointer scroll 10 0   # Scroll Up
binde = , r, exec, wlrctl pointer scroll -10 0  # Scroll Down
binde = , t, exec, wlrctl pointer scroll 0 -10  # Scroll Left
binde = , g, exec, wlrctl pointer scroll 0 10   # Scroll Right
# Exit submap & restore cursor settings
bind = , escape, exec, hyprctl keyword cursor:inactive_timeout 3; hyprctl keyword cursor:hide_on_key_press true; hyprctl dispatch submap reset
submap = reset

# Per-app opacity
windowrule = opacity 0.8 1, match:class Lorien
windowrule = opacity 0.88 1, match:class sublime_text
windowrule = opacity 0.9 1, match:class (?i)thunar
windowrule = opacity 0.88 1, match:class (?i)(vs)?codium
windowrule = opacity 0.9 1, match:class org.pwmt.zathura
windowrule = opacity 1.0 override 1.0 override, match:class firefox

# mpv: one named rule instead of four anonymous ones
windowrule {
    name = mpv-float
    match:class = mpv
    float = on
    size = 640 360
    center = on
    opacity = 1.0 override 1.0 override
}

windowrule = center on, match:float yes

windowrule {
    name = scratchterm
    match:class = scratchterm
    float = on
    size = 85% 70%
    center = on
}

# Layer rules (merged the blur/ignore_alpha pairs per namespace)
layerrule = blur on, ignore_alpha 0, match:namespace waybar
layerrule = blur on, ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur on, ignore_alpha 0, match:namespace swaync-notification-window
layerrule = blur on, ignore_alpha 0, match:namespace quickshell
