format = """
$directory\
$git_branch\
$git_status\
$git_state\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$aws\
$docker_context\
$jobs\
$status\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = "nord"

[directory]
style = 'bold fg:dark_blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:red'
format = '([$all_status$ahead_behind]($style) )'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
stashed = '*${count}'
modified = '!${count}'
staged = '+${count}'
untracked = '?${count}'
deleted = '✘${count}'

[git_state]
style = 'fg:yellow'
format = '[\($state( $progress_current/$progress_total)\)]($style) '

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
format = '[$symbol($version )]($style)'
symbol = ' '

[nodejs]
style = 'green'
format = '[$symbol($version )]($style)'
symbol = ' '

[golang]
style = 'teal'
format = '[$symbol($version )]($style)'
symbol = ' '

[haskell]
style = 'purple'
format = '[$symbol($version )]($style)'
symbol = ' '

[rust]
style = 'orange'
format = '[$symbol($version )]($style)'
symbol = ' '

[ruby]
style = 'red'
format = '[$symbol($version )]($style)'
symbol = ' '

[package]
symbol = '󰏗 '

[aws]
symbol = ' '
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = ' '
style = 'teal'
format = '[$symbol$context ]($style)'
only_with_files = true
detect_files = [
    'docker-compose.yml',
    'docker-compose.yaml',
    'compose.yml',
    'compose.yaml',
    'Dockerfile',
]

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[status]
disabled = false
style = 'fg:red'
symbol = '✘'
format = '[$symbol $status ]($style)'

[cmd_duration]
min_time = 500
style = 'fg:light_gray'
format = '[$duration]($style)'

[palettes.nord]
dark_blue = '#5E81AC'
blue = '#81A1C1'
teal = '#88C0D0'
red = '#BF616A'
orange = '#D08770'
green = '#A3BE8C'
yellow = '#EBCB8B'
purple = '#B48EAD'
gray = '#434C5E'
light_gray = '#616E88'
black = '#2E3440'
white = '#D8DEE9'

[palettes.onedark]
dark_blue = '#61afef'
blue = '#56b6c2'
red = '#e06c75'
green = '#98c379'
purple = '#c678dd'
cyan = '#56b6c2'
orange = '#be5046'
yellow = '#e5c07b'
gray = '#828997'
light_gray = '#828997'
teal = '#56b6c2'
white = '#abb2bf'
black = '#2c323c'
