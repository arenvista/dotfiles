# --- General Settings ---
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix
set-option -g default-shell /bin/zsh
set -g mouse on
set -g allow-passthrough on
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"          # NEW: robust true-color on tmux >= 3.2
set -g set-clipboard on                     # NEW: OSC 52 clipboard (works over SSH too)
set -g base-index 1                         # NEW: windows start at 1 (matches keyboard)
setw -g pane-base-index 1                   # NEW: panes too
set -g renumber-windows on                  # NEW: no gaps after closing windows
set -g detach-on-destroy off                # NEW: jump to another session instead of detaching

# --- Panes & Windows ---
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"  # NEW: new windows inherit cwd like splits
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5
bind m resize-pane -Z                        # CHANGED: dropped -r (double-tap was un-zooming)
bind -r "<" swap-window -d -t -1             # NEW: reorder windows
bind -r ">" swap-window -d -t +1             # NEW

# --- Copy Mode (vi) ---
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle   # NEW: block selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- Config Reload ---
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-resurrect'  # NEW: persist sessions across restarts
set -g @plugin 'tmux-plugins/tmux-continuum'  # NEW: auto-save for resurrect
set -g @continuum-restore 'on'                # NEW
# set -g @plugin '2kabhishek/tmux2k'

# --- Pywal Status Line ---
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 60

set -g status-style bg=default,fg=colour7
set -g status-left "#[fg=colour0,bg=colour4,bold] #S #[fg=colour4,bg=default]#{?client_prefix,#[fg=colour5] ^A,} "
set -g status-right "#[fg=colour8]%a %d %b  #[fg=colour4,bold]%H:%M "

setw -g window-status-separator ""
setw -g window-status-format "#[fg=colour8]  #I:#W "
setw -g window-status-current-format "#[fg=colour4,bold]  #I:#W#{?window_zoomed_flag, 󰊓,} "

# Initialize TPM (Keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
